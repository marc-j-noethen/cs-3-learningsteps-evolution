name: LearningSteps DevSecOps

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  ACR_NAME: lstepsdev3nafhr
  ACR_LOGIN_SERVER: lstepsdev3nafhr.azurecr.io
  IMAGE_NAME: learningsteps-api
  RESOURCE_GROUP: rg-learningsteps-evolution-dev
  AKS_CLUSTER: aks-learningsteps-dev
  K8S_NAMESPACE: learningsteps

jobs:
  quality-and-security:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/api/requirements.txt
          pip install pytest httpx ruff

      - name: Lint critical Python errors
        run: ruff check app/api --select E9,F63,F7,F82

      - name: Run tests
        run: pytest app/api/tests -q

      - name: Scan Git history for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown

      - name: Scan Terraform configuration
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: infra-terraform
          trivyignores: .trivyignore
          severity: HIGH,CRITICAL
          exit-code: "1"
          hide-progress: true

  build-scan-deploy:
    if: github.event_name == 'push'
    needs: quality-and-security
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to Azure with OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: az acr login --name "$ACR_NAME"

      - name: Build Docker image
        run: |
          docker build \
            --tag "$ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}" \
            --tag "$ACR_LOGIN_SERVER/$IMAGE_NAME:latest" \
            .

      - name: Scan Docker image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: lstepsdev3nafhr.azurecr.io/learningsteps-api:${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

      - name: Push verified image
        run: |
          docker push "$ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}"
          docker push "$ACR_LOGIN_SERVER/$IMAGE_NAME:latest"

      - name: Connect to AKS
        uses: azure/aks-set-context@v5
        with:
          resource-group: ${{ env.RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER }}
          admin: "true"
          
      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s-manifests/

      - name: Deploy immutable image version
        run: |
          kubectl set image \
            deployment/learningsteps-api \
            api="$ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}" \
            --namespace "$K8S_NAMESPACE"

          kubectl rollout status \
            deployment/learningsteps-api \
            --namespace "$K8S_NAMESPACE" \
            --timeout=180s
