apiVersion: apps/v1
kind: Deployment
metadata:
  name: learningsteps-api
  namespace: learningsteps
  labels:
    app: learningsteps-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: learningsteps-api
  template:
    metadata:
      labels:
        app: learningsteps-api
    spec:
      containers:
        - name: api
          image: lstepsdev3nafhr.azurecr.io/learningsteps-api:v1
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: learningsteps-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: learningsteps-database
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: secrets-store-inline
              mountPath: /mnt/secrets-store
              readOnly: true
      volumes:
        - name: secrets-store-inline
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: learningsteps-keyvault