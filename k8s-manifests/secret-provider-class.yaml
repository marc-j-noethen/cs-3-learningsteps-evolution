apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: learningsteps-keyvault
  namespace: learningsteps
spec:
  provider: azure
  secretObjects:
    - secretName: learningsteps-database
      type: Opaque
      data:
        - objectName: database-url
          key: DATABASE_URL
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: "b059dd17-404f-486c-a54e-e34417d081dd"
    keyvaultName: "kv-lsteps-dev-3nafhr"
    objects: |
      array:
        - |
          objectName: database-url
          objectType: secret
          objectVersion: ""
    tenantId: "c0531484-50fa-4ff2-97df-b1f2d4810603"